  assemblies:
  - Garyon
  namespace: Garyon.Functions
  summary: >-
    Determines whether two objects are equal using the

    <xref href="System.Object.Equals(System.Object)" data-throw-if-not-resolved="false"></xref> method without triggering a

    <xref href="System.NullReferenceException" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    This implementation avoids using the

    <xref href="System.Object.Equals(System.Object%2cSystem.Object)" data-throw-if-not-resolved="false"></xref> function in order to

    avoid the type checking overhead.
  example: []
  syntax:
    content: public static bool SafeEquals<T>(T left, T right)
    parameters:
    - id: left
      type: '{T}'
      description: The left object to compare.
    - id: right
      type: '{T}'
      description: The right object to compare.
    typeParameters:
    - id: T
      description: The type of the objects to compare.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if both objects are equal, or both are

        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>; otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Public Shared Function SafeEquals(Of T)(left As T, right As T) As Boolean
