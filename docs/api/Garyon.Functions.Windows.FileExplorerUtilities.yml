  assemblies:
  - Garyon
  namespace: Garyon.Functions.Windows
  summary: Opens the default set file explorer at the directory that is specified.
  remarks: >-
    This method uses the start command to open the file explorer. This is

    used by some third-party file explorers to open their custom explorer

    instead of the Windows one, for example File Pilot.
  example: []
  syntax:
    content: public static Process StartCustomExplorerAtRoot(string root)
    parameters:
    - id: root
      type: System.String
      description: The root folder to open the file explorer at.
    return:
      type: System.Diagnostics.Process
    content.vb: Public Shared Function StartCustomExplorerAtRoot(root As String) As Process
