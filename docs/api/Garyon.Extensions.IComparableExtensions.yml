    Assigns a variable storing a extremum value to <code class="paramref">other</code>,

    if found to be suitable as the new extremum.
  example: []
  syntax:
    content: 'public static void AssignExtremum<T>(this ref T extremum, T other, Extremum targetExtremum) where T : struct, IComparable<T>'
    parameters:
    - id: extremum
      type: '{T}'
      description: >-
        A reference to the variable storing the extremum. It may be overwritten

        if the comparison of <code class="paramref">other</code> against

        <code class="paramref">extremum</code> matches that of <code class="paramref">targetExtremum</code>.
    - id: other
      type: '{T}'
      description: >-
        The other value to overwrite <code class="paramref">extremum</code> with, if deemed

        as the new extremum.
    - id: targetExtremum
      type: Garyon.Objects.Extremum
      description: The target extremum to match.
    typeParameters:
    - id: T
      description: The type of the values being compared.
    content.vb: Public Shared Sub AssignExtremum(Of T As {Structure, IComparable(Of T)})(extremum As T, other As T, targetExtremum As Extremum)
