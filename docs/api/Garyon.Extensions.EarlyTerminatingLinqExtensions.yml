  assemblies:
  - Garyon
  namespace: Garyon.Extensions
  summary: >-
    Determines whether the sum of a collection of values satisfies a

    comparison against the target value.
  remarks: >-
    It is not necessary that the entire collection is enumerated.

    Enumeration halts upon alternation of satisfying the given comparison.

    <br />

    Overflows are not accounted for. Ensure that the sum of the entire

    collection will not overflow, causing this result to appear wrong.
  example: []
  syntax:
    content: public static bool SumSatisfies(this IEnumerable<ulong> values, ComparisonKinds comparisonKinds, ulong target)
    parameters:
    - id: values
      type: System.Collections.Generic.IEnumerable{System.UInt64}
      description: The collection of values whose sum to calculate.
    - id: comparisonKinds
      type: Garyon.Objects.ComparisonKinds
      description: The comparison kinds that must be satisfied.
    - id: target
      type: System.UInt64
      description: The target value to compare the collection's sum against.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the sum satisfies the given comparison,

        otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Public Shared Function SumSatisfies(values As IEnumerable(Of ULong), comparisonKinds As ComparisonKinds, target As ULong) As Boolean
