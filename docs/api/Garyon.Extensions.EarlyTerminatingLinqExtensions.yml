  assemblies:
  - Garyon
  namespace: Garyon.Extensions
  summary: >-
    Determines whether the sum of a collection of values is strictly less

    than the target.
  remarks: >-
    It is not necessary that the entire collection is enumerated.

    Enumeration halts upon alternation of satisfying the given comparison.

    <br />

    Overflows are not accounted for. Ensure that the sum of the entire

    collection will not overflow, causing this result to appear wrong.
  example: []
  syntax:
    content: public static bool SumsBelow(this IEnumerable<uint> values, uint target)
    parameters:
    - id: values
      type: System.Collections.Generic.IEnumerable{System.UInt32}
      description: The collection of values whose sum to calculate.
    - id: target
      type: System.UInt32
      description: The target value to compare the collection's sum against.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the sum is strictly less than (&lt;) the

        target, otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Public Shared Function SumsBelow(values As IEnumerable(Of UInteger), target As UInteger) As Boolean
