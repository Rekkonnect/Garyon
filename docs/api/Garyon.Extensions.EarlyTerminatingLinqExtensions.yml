  namespace: Garyon.Extensions
  summary: >-
    Enumerates a collection, but halts enumeration as soon as a value that

    satisfies the given predicate is found.
  example: []
  syntax:
    content: public static IEnumerable<T> CutAt<T>(this IEnumerable<T> source, Predicate<T> predicate, bool includeHaltingValue = false)
    parameters:
    - id: source
      type: System.Collections.Generic.IEnumerable{{T}}
      description: >-
        The collection whose values to enumerate and evaluate through

        <code class="paramref">predicate</code>.
    - id: predicate
      type: System.Predicate{{T}}
      description: The predicate which will cause enumeration to halt upon being satisfied.
    - id: includeHaltingValue
      type: System.Boolean
      description: >-
        Determines whether the final value that causes enumeration to halt

        should be retuned or not.
    typeParameters:
    - id: T
      description: The type of the values the collection contains.
    return:
      type: System.Collections.Generic.IEnumerable{{T}}
      description: >-
        The first elements that do not satisfy <code class="paramref">predicate</code>,

        and, optionally, the first value that satisfies it.
