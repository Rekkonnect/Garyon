    id: WaitAllIteratively
    path: ../Garyon/Extensions/TaskAwaiting.cs
    startLine: 40
  assemblies:
  - Garyon
  namespace: Garyon.Extensions
  summary: Awaits enumeration of the entire <xref href="System.Collections.Generic.IAsyncEnumerable%601" data-throw-if-not-resolved="false"></xref> and awaits all tasks.
  remarks: The implementation first awaits iteration to the next element in the <xref href="System.Collections.Generic.IAsyncEnumerable%601" data-throw-if-not-resolved="false"></xref> and then awaits the yielded <xref href="System.Threading.Tasks.Task" data-throw-if-not-resolved="false"></xref>, without guaranteeing that all tasks have been initialized and are simultaneously running on the background before their yielding. If this behavior is undesirable, consider using the <xref href="Garyon.Extensions.TaskAwaiting.WaitAll(System.Collections.Generic.IAsyncEnumerable%7bSystem.Threading.Tasks.Task%7d)" data-throw-if-not-resolved="false"></xref> method.
  example: []
  syntax:
    content: public static Task WaitAllIteratively(this IAsyncEnumerable<Task> tasks)
    parameters:
    - id: tasks
      type: System.Collections.Generic.IAsyncEnumerable{System.Threading.Tasks.Task}
      description: The tasks to await. The collection will be enumerated.
    return:
      type: System.Threading.Tasks.Task
      description: A <xref href="System.Threading.Tasks.Task" data-throw-if-not-resolved="false"></xref> that represents the operation of awaiting all tasks in the collection.
    content.vb: Public Shared Function WaitAllIteratively(tasks As IAsyncEnumerable(Of Task)) As Task
  overload: Garyon.Extensions.TaskAwaiting.WaitAllIteratively*
