  namespace: Garyon.Extensions
  summary: Awaits enumeration of the entire <xref href="System.Collections.Generic.IAsyncEnumerable%601" data-throw-if-not-resolved="false"></xref> and awaits all tasks.
  remarks: The implementation uses the <xref href="Garyon.Extensions.IAsyncEnumerableExtensions.ToListAsync%60%601(System.Collections.Generic.IAsyncEnumerable%7b%60%600%7d)" data-throw-if-not-resolved="false"></xref> method to first ensure all the elements are enumerated, forcing all tasks to be initialized, if they haven't already been. If this behavior is undesirable, consider using the <xref href="Garyon.Extensions.TaskAwaiting.WaitAllIteratively(System.Collections.Generic.IAsyncEnumerable%7bSystem.Threading.Tasks.Task%7d)" data-throw-if-not-resolved="false"></xref> method.
  example: []
  syntax:
    content: public static Task WaitAll(this IAsyncEnumerable<Task> tasks)
    parameters:
    - id: tasks
      type: System.Collections.Generic.IAsyncEnumerable{System.Threading.Tasks.Task}
      description: The tasks to await. The collection will be enumerated.
    return:
      type: System.Threading.Tasks.Task
      description: A <xref href="System.Threading.Tasks.Task" data-throw-if-not-resolved="false"></xref> that represents the operation of awaiting all tasks in the collection.
    content.vb: Public Shared Function WaitAll(tasks As IAsyncEnumerable(Of Task)) As Task
