    id: CancelUnblock
    path: ../Garyon/Mechanisms/Delayer.cs
    startLine: 69
  assemblies:
  - Garyon
  namespace: Garyon.Mechanisms
  summary: >-
    Cancels the next unblock time, effectively unblocking the delayer and

    allowing any unblock time to be set.
  remarks: >-
    If an active await task is present, it will be ignored but not

    cancelled. The task returned from

    <xref href="Garyon.Mechanisms.Delayer.WaitUnblock(System.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> must have its cancellation

    token signal the cancellation manually in order to avoid waiting for the

    original unblock time.
  example: []
  syntax:
    content: public void CancelUnblock()
    content.vb: Public Sub CancelUnblock()
  overload: Garyon.Mechanisms.Delayer.CancelUnblock*
- uid: Garyon.Mechanisms.Delayer.WaitUnblock(System.Threading.CancellationToken)
