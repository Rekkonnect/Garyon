  langs:
  - csharp
  - vb
  name: WaitUnblock(CancellationToken)
  nameWithType: Delayer.WaitUnblock(CancellationToken)
  fullName: Garyon.Mechanisms.Delayer.WaitUnblock(System.Threading.CancellationToken)
  type: Method
  source:
    remote:
      path: Garyon/Mechanisms/Delayer.cs
      branch: dev/import-utils/a
      repo: https://github.com/Rekkonnect/Garyon.git
    id: WaitUnblock
    path: ../Garyon/Mechanisms/Delayer.cs
    startLine: 90
  assemblies:
  - Garyon
  namespace: Garyon.Mechanisms
  summary: >-
    Waits until the unblock time is reached. This allows consecutive unblock

    time delays until the instance is considered unblocked, via methods like

    <xref href="Garyon.Mechanisms.Delayer.ExtendNextUnblock(System.DateTime)" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    The <code class="paramref">cancellationToken</code> must be manually cancelled if

    <xref href="Garyon.Mechanisms.Delayer.CancelUnblock" data-throw-if-not-resolved="false"></xref> is called while awaiting the task.
  example: []
  syntax:
    content: public Task WaitUnblock(CancellationToken cancellationToken)
    parameters:
    - id: cancellationToken
      type: System.Threading.CancellationToken
      description: A <xref href="System.Threading.CancellationToken" data-throw-if-not-resolved="false"></xref> allowing to cancel the awaiting task.
    return:
      type: System.Threading.Tasks.Task
      description: A task representing the awaiting of the next unblock time.
    content.vb: Public Function WaitUnblock(cancellationToken As CancellationToken) As Task
  overload: Garyon.Mechanisms.Delayer.WaitUnblock*
