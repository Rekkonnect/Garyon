  namespace: Garyon.Mechanisms
  summary: >-
    Sets the next unblock time to <xref href="System.DateTime.Now" data-throw-if-not-resolved="false"></xref> plus the

    specified <xref href="System.TimeSpan" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    If the next unblock is already set to a later time, this method does not

    overwrite the next unblock time.
