  assemblies:
  - Garyon
  namespace: Garyon.Memory
  summary: >-
    Allocates a block of elements of a specified type

    <code class="typeparamref">T</code> from the unmanaged heap.
  example: []
  syntax:
    content: 'public static T* Allocate<T>(int elements) where T : unmanaged'
    parameters:
    - id: elements
      type: System.Int32
      description: The number of elements the allocated block will store.
    typeParameters:
    - id: T
      description: The type of elements the allocated block will store.
    return:
      type: '{T}*'
      description: >-
        A <code class="typeparamref">T</code>* pointing to the start of the allocated

        block. The block's size is equal to the number of elements multiplied by

        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/operators/sizeof">sizeof</a>(<code class="typeparamref">T</code>).
    content.vb: Public Shared Function Allocate(Of T As Structure)(elements As Integer) As T*
  overload: Garyon.Memory.Allocation.Allocate*
  nameWithType.vb: Allocation.Allocate(Of T)(Integer)
  fullName.vb: Garyon.Memory.Allocation.Allocate(Of T)(Integer)
  name.vb: Allocate(Of T)(Integer)
