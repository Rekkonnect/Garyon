  namespace: Garyon.Extensions
  summary: Inserts an element in the stack at the specified index.
  remarks: >-
    This is an expensive operation, due to the lack of the necessary public

    APIs for speeding up the insertion.
  example: []
  syntax:
    content: public static void Insert<T>(this Stack<T> stack, T item, int index)
    parameters:
    - id: stack
      type: System.Collections.Generic.Stack{{T}}
      description: The stack.
    - id: item
      type: '{T}'
      description: The item to insert into the stack.
    - id: index
      type: System.Int32
      description: The index at which the item will be inserted.
    typeParameters:
    - id: T
      description: The type of the values stored in the stack.
    content.vb: Public Shared Sub Insert(Of T)(stack As Stack(Of T), item As T, index As Integer)
