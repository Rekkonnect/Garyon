  assemblies:
  - Garyon
  namespace: Garyon.Functions.Arrays
  summary: >-
    Determines whether an array type contains elements of the provided type.

    It only checks for multidimensional arrays (of the form [(,)*]). Jagged

    arrays are not taken into consideration in this implementation.
  example: []
  syntax:
    content: public static bool IsArrayOfType<TArray, TElement>()
    typeParameters:
    - id: TArray
      description: The type of the array.
    - id: TElement
      description: The type of the element the array stores.
    return:
      type: System.Boolean
      description: >-
        Whether the given array type stores elements of the

        <code class="typeparamref">TElement</code> type.
    content.vb: Public Shared Function IsArrayOfType(Of TArray, TElement)() As Boolean
