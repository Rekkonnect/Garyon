  summary: >-
    Invokes the specified function and returns its result,

    or a default value if an exception is thrown.
  remarks: >-
    This method catches all exceptions thrown by the function and returns the default value
        instead. Use with caution, as it may suppress unexpected errors.
  example: []
  syntax:
    content: public static T? Try<T>(Func<T> func, T? defaultValue = default)
    parameters:
    - id: func
      type: System.Func{{T}}
      description: The function to invoke. Cannot be null.
    - id: defaultValue
      type: '{T}'
      description: >-
        The value to return if the function throws an exception.
            The default value for type T is used if not specified.
    typeParameters:
    - id: T
      description: The type of the value returned by the function.
    return:
      type: '{T}'
      description: >-
        The result of the function if it completes successfully; otherwise,

        the specified default value.
    content.vb: Public Shared Function [Try](Of T)(func As Func(Of T), defaultValue As T = Nothing) As T
