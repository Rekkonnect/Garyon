  summary: >-
    Tries the execution of a delegate and ignores any exceptions that may occur.

    Returns <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the delegate was executed successfully,

    otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> if an exception was thrown.
  example: []
  syntax:
    content: public static bool Try(Action action)
    parameters:
    - id: action
      type: System.Action
    return:
      type: System.Boolean
    content.vb: Public Shared Function [Try](action As Action) As Boolean
