  summary: >-
    Converts a <xref href="System.Collections.DictionaryEntry" data-throw-if-not-resolved="false"></xref> into a

    <xref href="System.Collections.Generic.KeyValuePair%602" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public static KeyValuePair<TKey, TValue?> ToKeyValuePair<TKey, TValue>(this DictionaryEntry entry)
    parameters:
    - id: entry
      type: System.Collections.DictionaryEntry
      description: >-
        The entry to convert into a

        <xref href="System.Collections.Generic.KeyValuePair%602" data-throw-if-not-resolved="false"></xref>.
    typeParameters:
    - id: TKey
      description: The type of the key in the <xref href="System.Collections.Generic.KeyValuePair%602" data-throw-if-not-resolved="false"></xref>.
    - id: TValue
      description: >-
        The type of the value in the

        <xref href="System.Collections.Generic.KeyValuePair%602" data-throw-if-not-resolved="false"></xref>.
    return:
      type: System.Collections.Generic.KeyValuePair{{TKey},{TValue}}
      description: >-
        A <xref href="System.Collections.Generic.KeyValuePair%602" data-throw-if-not-resolved="false"></xref> constructed from the

        given <xref href="System.Collections.DictionaryEntry" data-throw-if-not-resolved="false"></xref> whose key and value components

        are strongly typed.
    content.vb: Public Shared Function ToKeyValuePair(Of TKey, TValue)(entry As DictionaryEntry) As KeyValuePair(Of TKey, TValue)
