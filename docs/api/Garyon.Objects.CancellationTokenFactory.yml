  summary: Forces the creation of a new <xref href="System.Threading.CancellationTokenSource" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    This disposes the currently stored <xref href="System.Threading.CancellationTokenSource" data-throw-if-not-resolved="false"></xref>

    (without cancelling it) and replaces it with a new instance.
