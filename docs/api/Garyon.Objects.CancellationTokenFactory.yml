  namespace: Garyon.Objects
  summary: >-
    Cancels the current <xref href="System.Threading.CancellationToken" data-throw-if-not-resolved="false"></xref>. This does not

    automatically trigger the instantiation of the new

    <xref href="System.Threading.CancellationTokenSource" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    This cancels and disposes the currently stored

    <xref href="System.Threading.CancellationTokenSource" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public void Cancel()
    content.vb: Public Sub Cancel()
