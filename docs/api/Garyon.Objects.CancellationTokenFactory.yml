    current non-cancelled <xref href="System.Threading.CancellationToken" data-throw-if-not-resolved="false"></xref>. If the last

    stored <xref href="System.Threading.CancellationTokenSource" data-throw-if-not-resolved="false"></xref> had a requested

    cancellation, a new one will be created.
