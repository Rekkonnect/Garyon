  summary: Denotes that an object is cloneable into a target type, usually itself.
  example: []
  syntax:
    content: 'public interface ICloneable<T> : ICloneable where T : notnull'
    typeParameters:
    - id: T
      description: >-
        The type of the cloned object. Usually it's the type itself that implements

        this interface.
