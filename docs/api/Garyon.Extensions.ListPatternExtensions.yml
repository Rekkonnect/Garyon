  summary: >-
    Tries to get a single element from the given read-only list of a

    specified type.
  example: []
  syntax:
    content: 'public static bool TryGetSingle<TBase, TDerived>(this IReadOnlyList<TBase> list, out TDerived? single) where TDerived : TBase'
    parameters:
    - id: list
      type: System.Collections.Generic.IReadOnlyList{{TBase}}
      description: The read-only list whose elements to evaluate.
    - id: single
      type: '{TDerived}'
      description: >-
        The single element of the specified type to get. If the list does not

        contain a single element, or the single element is not of the specified

        type, this is <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/default">default</a>.
    typeParameters:
    - id: TBase
      description: The type of the elements in the list.
    - id: TDerived
      description: The type of the single element that must be matched.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the list only contains a single element that

        is of type <code class="typeparamref">TDerived</code>, otherwise

        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Public Shared Function TryGetSingle(Of TBase, TDerived As TBase)(list As IReadOnlyList(Of TBase), [single] As TDerived) As Boolean
