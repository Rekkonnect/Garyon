  summary: >-
    Gets and filters all the types defined in all assemblies for the given

    <xref href="System.AppDomain" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public static IEnumerable<Type> GetAllTypes(this AppDomain domain, Predicate<Type> predicate)
    parameters:
    - id: domain
      type: System.AppDomain
      description: The <xref href="System.AppDomain" data-throw-if-not-resolved="false"></xref> whose types to get.
    - id: predicate
      type: System.Predicate{System.Type}
      description: The filter to determine which types are included in the result.
    return:
      type: System.Collections.Generic.IEnumerable{System.Type}
      description: >-
        The filtered types contained in all assemblies in

        <code class="paramref">domain</code>.
    content.vb: Public Shared Function GetAllTypes(domain As AppDomain, predicate As Predicate(Of Type)) As IEnumerable(Of Type)
