  namespace: Garyon.Reflection
  summary: >-
    Determines whether the provided type can inherit any type, either a

    class or an interface.
  example: []
  syntax:
    content: public static bool CanInherit(this Type type)
    parameters:
    - id: type
      type: System.Type
      description: The type to determine whether it can inherit any type.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the type can inherit any type; that is, it is

