    id: TryLock
    path: ../Garyon/Mechanisms/AsyncUsableLock.cs
    startLine: 36
  assemblies:
  - Garyon
  namespace: Garyon.Mechanisms
  summary: >-
    Attempts to lock the current lock, and immediately returns if already

    held.
  example: []
  syntax:
    content: public AsyncUsableLock.LockReleaser TryLock(out bool success)
    parameters:
    - id: success
      type: System.Boolean
      description: >-
        Returns <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if this lock was successfully locked,

        otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> if the lock was already held.
    return:
      type: Garyon.Mechanisms.AsyncUsableLock.LockReleaser
      description: >-
        A <xref href="Garyon.Mechanisms.AsyncUsableLock.LockReleaser" data-throw-if-not-resolved="false"></xref> instance unlocking this instance once the

        releaser is disposed, or <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/default">default</a> if the lock was

        already held. The <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/default">default</a> value can be simply ignored

        and left to be disposed for a no-op.
    content.vb: Public Function TryLock(success As Boolean) As AsyncUsableLock.LockReleaser
  overload: Garyon.Mechanisms.AsyncUsableLock.TryLock*
  nameWithType.vb: AsyncUsableLock.TryLock(Boolean)
  fullName.vb: Garyon.Mechanisms.AsyncUsableLock.TryLock(Boolean)
  name.vb: TryLock(Boolean)
