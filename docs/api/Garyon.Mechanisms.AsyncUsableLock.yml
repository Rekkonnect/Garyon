    id: Lock
    path: ../Garyon/Mechanisms/AsyncUsableLock.cs
    startLine: 55
  assemblies:
  - Garyon
  namespace: Garyon.Mechanisms
  summary: >-
    Locks the current instance and returns a <xref href="Garyon.Mechanisms.AsyncUsableLock.LockReleaser" data-throw-if-not-resolved="false"></xref>

    allowing the usage of the disposal pattern via <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/using">using</a>.

    If the lock is currently locked, this method will block until the lock

    is released from the current lock holder.
  example: []
  syntax:
    content: public AsyncUsableLock.LockReleaser Lock()
    return:
      type: Garyon.Mechanisms.AsyncUsableLock.LockReleaser
      description: >-
        A <xref href="Garyon.Mechanisms.AsyncUsableLock.LockReleaser" data-throw-if-not-resolved="false"></xref> instance unlocking this instance once the

        releaser is disposed.
    content.vb: Public Function Lock() As AsyncUsableLock.LockReleaser
  overload: Garyon.Mechanisms.AsyncUsableLock.Lock*
