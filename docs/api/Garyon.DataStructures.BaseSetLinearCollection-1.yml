  summary: >-
    Adds an item in the setted linear collection, if it is not already

    stored.
  example: []
  syntax:
    content: public bool Add(T item)
    parameters:
    - id: item
      type: '{T}'
      description: The item to add.
    return:
      type: System.Boolean
      description: >-
