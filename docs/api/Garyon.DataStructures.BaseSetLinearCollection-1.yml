  assemblies:
  - Garyon
  namespace: Garyon.DataStructures
  summary: >-
    Represents a linear collection accompanied by a set. This data structure

    encapsulates an ordered linear collection data type that has a specific

    insertion and removal order (e.g. <xref href="System.Collections.Generic.Queue%601" data-throw-if-not-resolved="false"></xref>,

    <xref href="System.Collections.Generic.Stack%601" data-throw-if-not-resolved="false"></xref>) and a <xref href="System.Collections.Generic.HashSet%601" data-throw-if-not-resolved="false"></xref>. Through the

    usage of the set, the data structure ensures that no elements are contained

    more than once.
  example: []
  syntax:
    content: 'public abstract class BaseSetLinearCollection<T> : IReadOnlyCollection<T>, IEnumerable<T>, IEnumerable'
    typeParameters:
    - id: T
      description: The type of the stored elements.
    content.vb: Public MustInherit Class BaseSetLinearCollection(Of T) Implements IReadOnlyCollection(Of T), IEnumerable(Of T), IEnumerable
