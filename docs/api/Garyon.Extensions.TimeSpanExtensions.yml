  assemblies:
  - Garyon
  namespace: Garyon.Extensions
  summary: >-
    Creates a copy of a given <xref href="System.TimeSpan" data-throw-if-not-resolved="false"></xref>, where the hours

    component of the copied value is set to a specified value.
  example: []
  syntax:
    content: public static TimeSpan WithHours(this TimeSpan timeSpan, int hours)
    parameters:
    - id: timeSpan
      type: System.TimeSpan
      description: >-
        The <xref href="System.TimeSpan" data-throw-if-not-resolved="false"></xref> from which to create the copy with the

        adjusted hours component.
    - id: hours
      type: System.Int32
      description: >-
        The value of the hours component of the resulting copied

        <xref href="System.TimeSpan" data-throw-if-not-resolved="false"></xref>. It must be within the range [-23, 23] and

        match the sign of the given <xref href="System.TimeSpan" data-throw-if-not-resolved="false"></xref>, if non-zero.
    return:
      type: System.TimeSpan
      description: >-
        A copy of the original <xref href="System.TimeSpan" data-throw-if-not-resolved="false"></xref> with the hours

        component set to the specified value.
    content.vb: Public Shared Function WithHours(timeSpan As TimeSpan, hours As Integer) As TimeSpan
  overload: Garyon.Extensions.TimeSpanExtensions.WithHours*
  exceptions:
  - type: System.ArgumentOutOfRangeException
    commentId: T:System.ArgumentOutOfRangeException
    description: >-
      The given value for <code class="paramref">hours</code> is outside the range [-23,

      23] -or- does not match the sign of the given

