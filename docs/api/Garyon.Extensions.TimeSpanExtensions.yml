  assemblies:
  - Garyon
  namespace: Garyon.Extensions
  summary: >-
    Creates a copy of a given <xref href="System.TimeSpan" data-throw-if-not-resolved="false"></xref>, where the days

    component of the copied value is set to a specified value.
  example: []
  syntax:
    content: public static TimeSpan WithDays(this TimeSpan timeSpan, int days)
    parameters:
    - id: timeSpan
      type: System.TimeSpan
      description: >-
        The <xref href="System.TimeSpan" data-throw-if-not-resolved="false"></xref> from which to create the copy with the

        adjusted days component.
    - id: days
      type: System.Int32
      description: >-
        The value of the days component of the resulting copied

        <xref href="System.TimeSpan" data-throw-if-not-resolved="false"></xref>. It must match the sign of the given

        <xref href="System.TimeSpan" data-throw-if-not-resolved="false"></xref>, if non-zero.
    return:
      type: System.TimeSpan
      description: >-
        A copy of the original <xref href="System.TimeSpan" data-throw-if-not-resolved="false"></xref> with the days

        component set to the specified value.
    content.vb: Public Shared Function WithDays(timeSpan As TimeSpan, days As Integer) As TimeSpan
  overload: Garyon.Extensions.TimeSpanExtensions.WithDays*
  exceptions:
  - type: System.ArgumentOutOfRangeException
    commentId: T:System.ArgumentOutOfRangeException
    description: >-
      The given value for <code class="paramref">days</code> does not match the sign of

      the given <xref href="System.TimeSpan" data-throw-if-not-resolved="false"></xref>, if non-zero.
  nameWithType.vb: TimeSpanExtensions.WithDays(TimeSpan, Integer)
  fullName.vb: Garyon.Extensions.TimeSpanExtensions.WithDays(System.TimeSpan, Integer)
  name.vb: WithDays(TimeSpan, Integer)
