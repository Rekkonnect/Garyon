    nullable struct object has a value.
  example: []
  syntax:
    content: 'public static T ValueReturner<T>(T? value) where T : struct'
    parameters:
    - id: value
      type: System.Nullable{{T}}
      description: The provided nullable struct object.
    typeParameters:
