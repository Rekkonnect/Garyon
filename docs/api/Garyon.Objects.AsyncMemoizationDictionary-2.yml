  assemblies:
  - Garyon
  namespace: Garyon.Objects
  summary: >-
    Encapsulates a memoization dictionary for caching outputs of an async

    function.
  remarks: >-
    This uses a <xref href="System.Collections.Concurrent.ConcurrentDictionary%602" data-throw-if-not-resolved="false"></xref> under the hood,

    which is initialized with a given concurrency level and capacity in its

    constructor.
  example: []
  syntax:
    content: public AsyncMemoizationDictionary(Func<TInput, ValueTask<TOutput>> func, int concurrencyLevel, int capacity = 64)
    parameters:
    - id: func
      type: System.Func{{TInput},System.Threading.Tasks.ValueTask{{TOutput}}}
      description: The function that computes the outputs.
    - id: concurrencyLevel
      type: System.Int32
      description: >-
        The concurrency level to use for the cache dictionary, which should match

        the expected average concurrent readers of the cache. This matches the

        parameter in the constructor of

        <xref href="System.Collections.Concurrent.ConcurrentDictionary%602" data-throw-if-not-resolved="false"></xref>.
    - id: capacity
      type: System.Int32
      description: The initial capacity of the dictionary.
    content.vb: Public Sub New(func As Func(Of TInput, ValueTask(Of TOutput)), concurrencyLevel As Integer, capacity As Integer = 64)
