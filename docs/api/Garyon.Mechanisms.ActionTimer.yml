    id: Request
    path: ../Garyon/Mechanisms/ActionTimer.cs
    startLine: 45
  assemblies:
  - Garyon
  namespace: Garyon.Mechanisms
  summary: >-
    Requests the execution of an action based on the elapsed time.

    Optionally registers the current time as the last execution time.
  example: []
  syntax:
    content: public bool Request(bool register)
    parameters:
    - id: register
      type: System.Boolean
      description: >-
        If <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>, the current time will be registered as the

        last execution time, only if this method also returns

        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the elapsed time since the last execution is

        greater than the minimum required offset, otherwise

        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Public Function Request(register As Boolean) As Boolean
  overload: Garyon.Mechanisms.ActionTimer.Request*
  nameWithType.vb: ActionTimer.Request(Boolean)
  fullName.vb: Garyon.Mechanisms.ActionTimer.Request(Boolean)
  name.vb: Request(Boolean)
