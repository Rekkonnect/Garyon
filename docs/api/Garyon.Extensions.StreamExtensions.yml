  assemblies:
  - Garyon
  namespace: Garyon.Extensions
  summary: Determines whether a <xref href="System.IO.Stream" data-throw-if-not-resolved="false"></xref> has reached its end.
  example: []
  syntax:
    content: public static bool ReachedEnd(this Stream stream)
    parameters:
    - id: stream
      type: System.IO.Stream
      description: The <xref href="System.IO.Stream" data-throw-if-not-resolved="false"></xref> whose position to check.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if <xref href="System.IO.Stream.Position" data-throw-if-not-resolved="false"></xref> &gt;=

        <xref href="System.IO.Stream.Length" data-throw-if-not-resolved="false"></xref>, otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Public Shared Function ReachedEnd(stream As Stream) As Boolean
  overload: Garyon.Extensions.StreamExtensions.ReachedEnd*
