    id: ToByteArray
    path: ../Garyon/Extensions/StreamExtensions.cs
    startLine: 80
  assemblies:
  - Garyon
  namespace: Garyon.Extensions
  summary: >-
    Reads all the contents of the stream and stores them to a newly

    initialized <xref href="System.Byte" data-throw-if-not-resolved="false"></xref> array.
  remarks: >-
    Be careful when using this method on very large streams, all the

    contents will be copied over to the memory, which is far more limited

    than storage.
  example: []
  syntax:
    content: public static byte[] ToByteArray(this Stream stream)
    parameters:
    - id: stream
      type: System.IO.Stream
      description: >-
        The stream whose contents will be read and written into the target

        array.
    return:
      type: System.Byte[]
      description: >-
        The newly created <xref href="System.Byte" data-throw-if-not-resolved="false"></xref> array containing the read

        contents of the <xref href="System.IO.Stream" data-throw-if-not-resolved="false"></xref>.
    content.vb: Public Shared Function ToByteArray(stream As Stream) As Byte()
  overload: Garyon.Extensions.StreamExtensions.ToByteArray*
