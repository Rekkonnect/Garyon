  summary: The single instance of the type.
  remarks: >-
    It is not required that the type is not initialized elsewhere. This can

    also be used as a shared instance.
  example: []
  syntax:
    content: public static readonly T Instance
    return:
      type: '{T}'
    content.vb: Public Shared ReadOnly Instance As T
