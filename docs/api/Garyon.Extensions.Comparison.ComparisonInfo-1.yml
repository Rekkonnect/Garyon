  syntax:
    content: 'public ComparisonInfo<T> ThenBy<TResult>(Func<T, TResult> selector) where TResult : IComparable<TResult>'
    parameters:
    - id: selector
      type: System.Func{{T},{TResult}}
      description: The value selector to apply to the compared instances.
    typeParameters:
    - id: TResult
      description: The type of the selected value.
