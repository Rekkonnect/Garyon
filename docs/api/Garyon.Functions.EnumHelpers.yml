  namespace: Garyon.Functions
  summary: Registers the entry counts for the enum types from the given types.
  remarks: Ideally, this should only be called once per type in the collection.
  example: []
  syntax:
    content: public static void RegisterEntryCounts(IEnumerable<Type> types)
    parameters:
    - id: types
      type: System.Collections.Generic.IEnumerable{System.Type}
      description: >-
        The collection of types, from which the enum types' entry counts will be

        registered.
