  assemblies:
  - Garyon
  namespace: Garyon.Functions
  summary: Gets the number of entries defined in the specified enum type.
  remarks: >-
    This function has a O(1) time complexity, contrast to

    <xref href="Garyon.Functions.EnumHelpers.GetEntryCount(System.Type)" data-throw-if-not-resolved="false"></xref>, since the count is stored as a

    runtime constant. Thus, prefer calling this function wherever possible.
  example: []
  syntax:
    content: 'public static int GetEntryCount<T>() where T : unmanaged, Enum'
    typeParameters:
    - id: T
      description: The enum type whose entry count to get.
    return:
      type: System.Int32
      description: The number of entries defined in the enum type.
    content.vb: Public Shared Function GetEntryCount(Of T As {Structure, [Enum]})() As Integer
  overload: Garyon.Functions.EnumHelpers.GetEntryCount*
  nameWithType.vb: EnumHelpers.GetEntryCount(Of T)()
  fullName.vb: Garyon.Functions.EnumHelpers.GetEntryCount(Of T)()
  name.vb: GetEntryCount(Of T)()
