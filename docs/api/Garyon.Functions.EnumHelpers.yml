  assemblies:
  - Garyon
  namespace: Garyon.Functions
  summary: Gets the number of entries defined in the specified enum type.
  remarks: >-
    This function has a O(n) time complexity if the provided type has not

    been evaluated with either this, or the

    <xref href="Garyon.Functions.EnumHelpers.GetEntryCount%60%601" data-throw-if-not-resolved="false"></xref> function, otherwise it has a O(1)

    complexity. Thus, prefer calling the <xref href="Garyon.Functions.EnumHelpers.GetEntryCount%60%601" data-throw-if-not-resolved="false"></xref>

    function wherever possible.
  example: []
  syntax:
    content: public static int GetEntryCount(Type type)
    parameters:
    - id: type
      type: System.Type
      description: The enum type whose entry count to get.
    return:
      type: System.Int32
      description: The number of entries defined in the enum type.
    content.vb: Public Shared Function GetEntryCount(type As Type) As Integer
  overload: Garyon.Functions.EnumHelpers.GetEntryCount*
  exceptions:
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: The provided type is <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>, or not an enum type.
