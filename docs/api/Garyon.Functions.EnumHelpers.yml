  assemblies:
  - Garyon
  namespace: Garyon.Functions
  summary: Determines whether a value is defined in the enum <code class="typeparamref">TEnum</code>.
  remarks: The function is based on <xref href="System.Enum.IsDefined%60%601(%60%600)" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: 'public static bool IsDefined<TEnum, TUnderlying>(TUnderlying value) where TEnum : unmanaged, Enum where TUnderlying : unmanaged'
    parameters:
    - id: value
      type: '{TUnderlying}'
      description: The integral value to determine whether it's defined in an enum.
    typeParameters:
    - id: TEnum
      description: The type of the enum.
    - id: TUnderlying
      description: The underlying type of the enum, which is the type of the value instances.
    return:
      type: System.Boolean
      description: <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if <code class="typeparamref">TEnum</code> has a definition assigned to the specified integral value, otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Public Shared Function IsDefined(Of TEnum As {Structure, [Enum]}, TUnderlying As Structure)(value As TUnderlying) As Boolean
