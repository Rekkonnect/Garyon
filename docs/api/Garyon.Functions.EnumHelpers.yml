  assemblies:
  - Garyon
  namespace: Garyon.Functions
  summary: >-
    Determines whether <code class="typeparamref">TEnum</code>'s underlying value type

    is <code class="typeparamref">TUnderlying</code>.
  example: []
  syntax:
    content: 'public static bool IsEnumOfType<TEnum, TUnderlying>() where TEnum : unmanaged, Enum where TUnderlying : unmanaged'
    typeParameters:
    - id: TEnum
      description: The type of the enum.
    - id: TUnderlying
      description: >-
        The underlying type of the enum, which is the type of the value

        instances.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if <code class="typeparamref">TEnum</code> stores values of

        type <code class="typeparamref">TUnderlying</code>, otherwise

        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Public Shared Function IsEnumOfType(Of TEnum As {Structure, [Enum]}, TUnderlying As Structure)() As Boolean
