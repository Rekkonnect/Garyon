  assemblies:
  - Garyon
  namespace: Garyon.Functions.UnmanagedHelpers
  summary: >-
    Rescales a value into a different type. The returned value includes as

    many bytes as the target type allows from the original type, with the

    rest, if any, set to 0.
  example: []
  syntax:
    content: 'public static TTarget Rescale<TOrigin, TTarget>(TOrigin value) where TOrigin : unmanaged where TTarget : unmanaged'
    parameters:
    - id: value
      type: '{TOrigin}'
      description: The value to rescale.
    typeParameters:
    - id: TOrigin
      description: The type of the original value.
    - id: TTarget
      description: The target type to rescale the value into.
    return:
      type: '{TTarget}'
      description: The resulting value.
    content.vb: Public Shared Function Rescale(Of TOrigin As Structure, TTarget As Structure)(value As TOrigin) As TTarget
