    value, within a <xref href="System.Collections.Generic.KeyValuePair%602" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public delegate TValue ValueSelector<TKey, TValue>(TKey key)
    parameters:
    - id: key
      type: '{TKey}'
      description: The key to transform into a value.
