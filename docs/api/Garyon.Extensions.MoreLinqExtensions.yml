  assemblies:
  - Garyon
  namespace: Garyon.Extensions
  summary: >-
    Performs an action for each element in a collection, while also

    performing an additional specified action for the first and the last

    elements.
  example: []
  syntax:
    content: public static bool EnumeratePerformAction<T>(this IEnumerable<T> source, Action<T>? firstElementAction, Action<T>? lastElementAction, Action<T> enumerationAction)
    parameters:
    - id: source
      type: System.Collections.Generic.IEnumerable{{T}}
      description: >-
        The source collection whose elements to perform the actions on. If the

        collection is empty, no action will be taken.
    - id: firstElementAction
      type: System.Action{{T}}
      description: The action to perform on the first element.
    - id: lastElementAction
      type: System.Action{{T}}
      description: The action to perform on the last element.
    - id: enumerationAction
      type: System.Action{{T}}
      description: >-
        The action to perform on all enumerated elements. This is also applied

        to the first and the last elements.
    typeParameters:
    - id: T
      description: The type of the elements in the collection.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if <code class="paramref">source</code> contained at least

        one element and actions were performed, otherwise

        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Public Shared Function EnumeratePerformAction(Of T)(source As IEnumerable(Of T), firstElementAction As Action(Of T), lastElementAction As Action(Of T), enumerationAction As Action(Of T)) As Boolean
