  assemblies:
  - Garyon
  namespace: Garyon.DataStructures
  summary: >-
    Provides a thread-safe set implementation based on

    <xref href="System.Collections.Concurrent.ConcurrentDictionary%602" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    This encapsulates <xref href="System.Collections.Concurrent.ConcurrentDictionary%602" data-throw-if-not-resolved="false"></xref> as a

    concurrent set, using <xref href="System.Byte" data-throw-if-not-resolved="false"></xref> as the value type that is mapped

    from the key of <code class="typeparamref">T</code>. The idea of using byte is inspired

    by dotnet/roslyn.
  example: []
  syntax:
    content: 'public sealed class ConcurrentSet<T> : ISet<T>, ICollection<T>, IReadOnlyCollection<T>, IEnumerable<T>, IEnumerable where T : notnull'
