  namespace: Garyon.Extensions
  summary: >-
    Splits the given span based on the first occurrence of the delimiter,

    returning the left and right slices.
  example: []
  syntax:
    content: 'public static bool SplitOnce<TSource>(this ReadOnlySpan<TSource> span, TSource delimiter, out ReadOnlySpan<TSource> left, out ReadOnlySpan<TSource> right) where TSource : IEquatable<TSource>'
    parameters:
    - id: span
      type: System.ReadOnlySpan{{TSource}}
      description: The span to delimit.
    - id: delimiter
      type: '{TSource}'
      description: The delimiter to find in the span.
    - id: left
      type: System.ReadOnlySpan{{TSource}}
      description: >-
        The left segment of the span up until before the delimiter. If the

        delimiter is not found, this will equal the entire span.
    - id: right
      type: System.ReadOnlySpan{{TSource}}
      description: >-
        The right segment of the span starting from the next character after the

        first occurrence of the delimiter. If the delimiter is not found, this

        will equal <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/default">default</a>.
    typeParameters:
    - id: TSource
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the delimiter was found at least once,

        otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Public Shared Function SplitOnce(Of TSource As IEquatable(Of TSource))(span As ReadOnlySpan(Of TSource), delimiter As TSource, left As ReadOnlySpan(Of TSource), right As ReadOnlySpan(Of TSource)) As Boolean
