  assemblies:
  - Garyon
  namespace: Garyon.Extensions
  summary: >-
    Splits the given span based on a delimiter, and selects each split

    section into a target value using a selector.
  remarks: >-
    Use

    <xref href="Garyon.Extensions.ToCollectionExtensions.ToListOrExisting%60%601(System.Collections.Generic.IEnumerable%7b%60%600%7d)" data-throw-if-not-resolved="false"></xref>

    to get the values as a mutable list.
  example: []
  syntax:
    content: 'public static IReadOnlyList<TResult> SplitSelect<TSource, TResult>(this ReadOnlySpan<TSource> source, TSource delimiter, SpanExtensions.ReadOnlySpanSelector<TSource, TResult> selector) where TSource : IEquatable<TSource>'
    parameters:
    - id: source
      type: System.ReadOnlySpan{{TSource}}
      description: >-
        The source <xref href="System.ReadOnlySpan%601" data-throw-if-not-resolved="false"></xref> that will be delimited by

        the given delimiter into multiple segments, and immediately converted.
    - id: delimiter
      type: '{TSource}'
      description: The <xref href="System.String" data-throw-if-not-resolved="false"></xref> ddelimiter.
    - id: selector
      type: Garyon.Extensions.SpanExtensions.ReadOnlySpanSelector{{TSource},{TResult}}
      description: >-
        The <xref href="Garyon.Extensions.SpanExtensions.ReadOnlySpanSelector%602" data-throw-if-not-resolved="false"></xref> instance

        that will select the delimited sections into the returned values. Must

        not be <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>.
    typeParameters:
    - id: TSource
      description: The type of the values stored in the span.
    - id: TResult
      description: The type of the selected values.
    return:
      type: System.Collections.Generic.IReadOnlyList{{TResult}}
      description: >-
        The values returned from the selector as a readonly list, in the order

        they were found in the source <xref href="System.ReadOnlySpan%601" data-throw-if-not-resolved="false"></xref>.
    content.vb: Public Shared Function SplitSelect(Of TSource As IEquatable(Of TSource), TResult)(source As ReadOnlySpan(Of TSource), delimiter As TSource, selector As SpanExtensions.ReadOnlySpanSelector(Of TSource, TResult)) As IReadOnlyList(Of TResult)
