  syntax:
    content: 'public static bool AddOrSet<TKey, TValue>(this IDictionary<TKey, TValue> source, TKey key, TValue value) where TKey : notnull'
    parameters:
    - id: source
      type: System.Collections.Generic.IDictionary{{TKey},{TValue}}
      description: The source dictionary.
    - id: key
      type: '{TKey}'
      description: The key of the entry to add or overwrite.
    - id: value
      type: '{TValue}'
      description: The value of the entry to set.
    typeParameters:
    - id: TKey
      description: The type of the keys stored in the dictionary.
    - id: TValue
      description: The type of the values stored in the dictionary.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the entry already existed with a different

