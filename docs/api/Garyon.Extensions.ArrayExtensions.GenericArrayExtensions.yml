  assemblies:
  - Garyon
  namespace: Garyon.Extensions.ArrayExtensions
  summary: >-
    Determines whether an array type contains elements of the provided type.

    It also checks for jagged arrays up to a maximum jagging level. Also

    built as an extension method to allow per-instance call.
  example: []
  syntax:
    content: public static bool IsArrayOfType<TElement>(this Array array, int maxJaggingLevel)
    parameters:
    - id: array
      type: System.Array
      description: The array whose type to examine.
    - id: maxJaggingLevel
      type: System.Int32
      description: >-
        The maximum jagging level of the array (1 means up to [], 2 means up to

        [][], etc.).
    typeParameters:
    - id: TElement
      description: The type of the element the array stores.
    return:
      type: System.Boolean
      description: >-
        Whether the given array type stores elements of the

        <code class="typeparamref">TElement</code> type.
    content.vb: Public Shared Function IsArrayOfType(Of TElement)(array As Array, maxJaggingLevel As Integer) As Boolean
  overload: Garyon.Extensions.ArrayExtensions.GenericArrayExtensions.IsArrayOfType*
