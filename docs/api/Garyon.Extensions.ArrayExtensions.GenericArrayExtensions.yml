  assemblies:
  - Garyon
  namespace: Garyon.Extensions.ArrayExtensions
  summary: >-
    Determines whether an array type contains elements of the provided type.

    It only checks for multidimensional arrays (of the form [(,)*]). Jagged

    arrays are not taken into consideration in this implementation. Also

    built as an extension method to allow per-instance call.
  example: []
  syntax:
    content: public static bool IsArrayOfType<TElement>(this Array array)
    parameters:
    - id: array
      type: System.Array
      description: The array whose type to examine.
    typeParameters:
    - id: TElement
      description: The type of the element the array stores.
    return:
      type: System.Boolean
      description: >-
        Whether the given array type stores elements of the

        <code class="typeparamref">TElement</code> type.
    content.vb: Public Shared Function IsArrayOfType(Of TElement)(array As Array) As Boolean
  overload: Garyon.Extensions.ArrayExtensions.GenericArrayExtensions.IsArrayOfType*
  nameWithType.vb: GenericArrayExtensions.IsArrayOfType(Of TElement)(Array)
  fullName.vb: Garyon.Extensions.ArrayExtensions.GenericArrayExtensions.IsArrayOfType(Of TElement)(System.Array)
