  assemblies:
  - Garyon
  namespace: Garyon.Objects.Enumerators
  summary: >-
    Conditionally calls the <xref href="System.Collections.IEnumerator.MoveNext" data-throw-if-not-resolved="false"></xref> method on

    the provided enumerator, if <code class="paramref">alive</code> is

    <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>.
  example: []
  syntax:
    content: protected static void ConditionallyMoveNext<T>(IEnumerator<T> enumerator, ref bool alive)
    parameters:
    - id: enumerator
      type: System.Collections.Generic.IEnumerator{{T}}
      description: The enumerator.
    - id: alive
      type: System.Boolean
      description: >-
        Determines whether the enumerator should move to the next element. The

        result of the <xref href="System.Collections.IEnumerator.MoveNext" data-throw-if-not-resolved="false"></xref> method is stored back

        to this variable.
    typeParameters:
    - id: T
      description: >-
        The type of the elements the <xref href="System.Collections.Generic.IEnumerator%601" data-throw-if-not-resolved="false"></xref>

        enumerates.
    content.vb: Protected Shared Sub ConditionallyMoveNext(Of T)(enumerator As IEnumerator(Of T), alive As Boolean)
