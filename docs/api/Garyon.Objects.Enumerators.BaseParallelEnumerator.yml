  namespace: Garyon.Objects.Enumerators
  summary: Gets the current value of the <xref href="System.Collections.Generic.IEnumerator%601" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: protected static T? GetCurrentValue<T>(IEnumerator<T> enumerator, bool alive)
    parameters:
    - id: enumerator
      type: System.Collections.Generic.IEnumerator{{T}}
      description: The enumerator.
    - id: alive
      type: System.Boolean
      description: >-
        Determines whether the enumerator's current position is before the end

        of the collection, allowing it to retrieve the

        <xref href="System.Collections.Generic.IEnumerator%601.Current" data-throw-if-not-resolved="false"></xref> value.
    typeParameters:
    - id: T
      description: >-
        The type of the elements the <xref href="System.Collections.Generic.IEnumerator%601" data-throw-if-not-resolved="false"></xref>

        enumerates.
    return:
      type: '{T}'
      description: >-
        The current value of the <xref href="System.Collections.Generic.IEnumerator%601" data-throw-if-not-resolved="false"></xref>, if

        <code class="paramref">alive</code> is <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>, otherwise

        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/default">default</a>.
    content.vb: Protected Shared Function GetCurrentValue(Of T)(enumerator As IEnumerator(Of T), alive As Boolean) As T
