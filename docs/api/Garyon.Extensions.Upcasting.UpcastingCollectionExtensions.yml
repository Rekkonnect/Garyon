  summary: >-
    Upcasts the given <xref href="System.Collections.Generic.IList%601" data-throw-if-not-resolved="false"></xref> into a list of

    <code class="typeparamref">TUp</code> instances.
  remarks: >-
    No validation is performed on whether all the elements of the list are

    <code class="typeparamref">TUp</code>. This method is unsafe and should be used on

    lists where it is known. If an element is not actually

    <code class="typeparamref">TUp</code>, accessing it (for example by indexing or

    enumeration) will throw an exception at runtime.
  example: []
  syntax:
    content: 'public static IList<TUp> UpcastList<TBase, TUp>(this IList<TBase> source) where TUp : class, TBase'
    parameters:
    - id: source
      type: System.Collections.Generic.IList{{TBase}}
      description: The source list to upcast.
    typeParameters:
    - id: TBase
      description: The base type of the list's elements.
    - id: TUp
      description: The type to upcast all of the list's elements.
    return:
      type: System.Collections.Generic.IList{{TUp}}
      description: >-
        An instance that returns the source list's elements cast into

        <code class="typeparamref">TUp</code>.
    content.vb: Public Shared Function UpcastList(Of TBase, TUp As {Class, TBase})(source As IList(Of TBase)) As IList(Of TUp)
