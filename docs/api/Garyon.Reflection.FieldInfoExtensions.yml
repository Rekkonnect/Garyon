  namespace: Garyon.Reflection
  summary: Determines the kind of the invokable type of a field.
  example: []
  syntax:
    content: public static InvokableTypeKind GetFieldInvokableTypeKind(this FieldInfo field)
    parameters:
    - id: field
      type: System.Reflection.FieldInfo
      description: The field whose type to evaluate.
    return:
      type: Garyon.Reflection.InvokableTypeKind
      description: >-
        The respective kind of invokable type that the field's type is.

        <xref href="Garyon.Reflection.InvokableTypeKind.Invalid" data-throw-if-not-resolved="false"></xref> will be returned if the

        field type is not an invokable type.
