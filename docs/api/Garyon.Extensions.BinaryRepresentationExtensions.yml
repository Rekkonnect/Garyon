  assemblies:
  - Garyon
  namespace: Garyon.Extensions
  summary: >-
    Gets the binary representation of the <xref href="System.Byte" data-throw-if-not-resolved="false"></xref> value,

    while also grouping the digits.
  example: []
  syntax:
    content: public static string GetGroupedBinaryRepresentation(this byte value, int groupLength, int totalBits = 8)
    parameters:
    - id: value
      type: System.Byte
      description: The value.
    - id: groupLength
      type: System.Int32
      description: >-
        The length of each digit group in the resulting binary representation.

        Must be non-negative. If 0, no grouping is performed.
    - id: totalBits
      type: System.Int32
      description: >-
        The total bits to display. Defaults to the number of bits a

        <xref href="System.Byte" data-throw-if-not-resolved="false"></xref> value contains.
    return:
      type: System.String
      description: The binary representation of the value.
    content.vb: Public Shared Function GetGroupedBinaryRepresentation(value As Byte, groupLength As Integer, totalBits As Integer = 8) As String
