  summary: >-
    Represents a set whose elements are stored in a queue. This data structure

    encapsulates a <xref href="System.Collections.Generic.Queue%601" data-throw-if-not-resolved="false"></xref> and a

    <xref href="System.Collections.Generic.HashSet%601" data-throw-if-not-resolved="false"></xref>. Through the usage of the set, the data

    structure ensures that no elements are contained more than once.
