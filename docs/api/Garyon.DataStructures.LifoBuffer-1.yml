    id: GetOrderedBuffer
    path: ../Garyon/DataStructures/LifoBuffer.cs
    startLine: 80
  assemblies:
  - Garyon
  namespace: Garyon.DataStructures
  summary: >-
    Gets the buffer split into two <xref href="System.ReadOnlySpan%601" data-throw-if-not-resolved="false"></xref> instances,

    showing the slice representing the newest and the oldest elements. The

    buffer is split to preserve its memory contiguity property.
  example: []
  syntax:
    content: public void GetOrderedBuffer(out ReadOnlySpan<T> newest, out ReadOnlySpan<T> oldest)
    parameters:
    - id: newest
      type: System.ReadOnlySpan{{T}}
      description: >-
        The <xref href="System.ReadOnlySpan%601" data-throw-if-not-resolved="false"></xref> representing the newest elements that

        were appended to the buffer. The last element of this span is the most

        recent. The span may be empty, indicating that either the buffer is

        empty, or the last appended item overwrote the last item in the buffer,

        meaning that the next append will overwrite the first item in the

        buffer.
    - id: oldest
      type: System.ReadOnlySpan{{T}}
      description: >-
        The <xref href="System.ReadOnlySpan%601" data-throw-if-not-resolved="false"></xref> representing the oldest elements that

        were appended to the buffer. The first element of this span is the

        oldest. The span may be empty, indicating that either the buffer is

        empty. If at least one item has been added to the buffer, this span will

        never be empty.
    content.vb: Public Sub GetOrderedBuffer(newest As ReadOnlySpan(Of T), oldest As ReadOnlySpan(Of T))
  overload: Garyon.DataStructures.LifoBuffer`1.GetOrderedBuffer*
  nameWithType.vb: LifoBuffer(Of T).GetOrderedBuffer(ReadOnlySpan(Of T), ReadOnlySpan(Of T))
  fullName.vb: Garyon.DataStructures.LifoBuffer(Of T).GetOrderedBuffer(System.ReadOnlySpan(Of T), System.ReadOnlySpan(Of T))
  name.vb: GetOrderedBuffer(ReadOnlySpan(Of T), ReadOnlySpan(Of T))
