  assemblies:
  - Garyon
  namespace: Garyon.Extensions
  summary: >-
    Gets a value from a data row on the given table,

    by the column name, and casts it onto the specified type.
  remarks: >-
    It is not validated whether the table contains

    the provided row or not, so long as both the

    table and the row contain the requested column name,

    the value is successfully retrieved.
  example: []
  syntax:
    content: public static bool ReadField<T>(this DataTable table, DataRow row, string name, ref T field)
    parameters:
    - id: table
      type: System.Data.DataTable
      description: The table which contains the row.
    - id: row
      type: System.Data.DataRow
      description: The row whose column value to get.
    - id: name
      type: System.String
      description: The name of the column to get.
    - id: field
      type: '{T}'
      description: >-
        The field to store the value into if the column name exists,

        otherwise the parameter location remains unchanged. For the

        purposes of not setting the value if not found, it's required

        to be passed by <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/ref">ref</a>.
    typeParameters:
    - id: T
      description: The type to cast the value onto.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the column name was found in the

        table, otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Public Shared Function ReadField(Of T)(table As DataTable, row As DataRow, name As String, field As T) As Boolean
