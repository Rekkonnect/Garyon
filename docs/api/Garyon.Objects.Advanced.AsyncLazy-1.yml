  namespace: Garyon.Objects.Advanced
  summary: >-
    Provides a mechanism for a lazily initializable value that is created

    asynchronously.
  remarks: >-
    This type caches the <xref href="System.Threading.Tasks.Task%601" data-throw-if-not-resolved="false"></xref> returned by the factory. The

    factory is invoked at most once unless <xref href="Garyon.Objects.Advanced.AsyncLazy%601.ClearValue" data-throw-if-not-resolved="false"></xref> is called.
