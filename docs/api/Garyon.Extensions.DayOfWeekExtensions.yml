  assemblies:
  - Garyon
  namespace: Garyon.Extensions
  summary: >-
    Determines whether the given <xref href="System.DayOfWeek" data-throw-if-not-resolved="false"></xref> represents a

    weekend day, which is Saturday or Sunday.
  example: []
  syntax:
    content: >-
      [ExcludeFromCodeCoverage]

      public static bool IsWeekend(this DayOfWeek day)
    parameters:
    - id: day
      type: System.DayOfWeek
      description: The <xref href="System.DayOfWeek" data-throw-if-not-resolved="false"></xref> to determine if it's a weekend day.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the value is either

        <xref href="System.DayOfWeek.Saturday" data-throw-if-not-resolved="false"></xref> or

        <xref href="System.DayOfWeek.Sunday" data-throw-if-not-resolved="false"></xref>, otherwise false.
    content.vb: >-
      <ExcludeFromCodeCoverage>

      Public Shared Function IsWeekend(day As DayOfWeek) As Boolean
