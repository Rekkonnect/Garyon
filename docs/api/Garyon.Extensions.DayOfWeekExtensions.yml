  namespace: Garyon.Extensions
  summary: >-
    Determines whether the given <xref href="System.DayOfWeek" data-throw-if-not-resolved="false"></xref> represents a

    weekday, between Monday and Friday.
  example: []
  syntax:
    content: >-
      [ExcludeFromCodeCoverage]

      public static bool IsWeekday(this DayOfWeek day)
    parameters:
    - id: day
      type: System.DayOfWeek
      description: The <xref href="System.DayOfWeek" data-throw-if-not-resolved="false"></xref> to determine if it's a weekday.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the value is between

        <xref href="System.DayOfWeek.Monday" data-throw-if-not-resolved="false"></xref> and

        <xref href="System.DayOfWeek.Friday" data-throw-if-not-resolved="false"></xref>, inclusive, otherwise false.
    content.vb: >-
      <ExcludeFromCodeCoverage>

      Public Shared Function IsWeekday(day As DayOfWeek) As Boolean
