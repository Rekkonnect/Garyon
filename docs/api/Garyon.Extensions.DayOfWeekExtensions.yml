  assemblies:
  - Garyon
  namespace: Garyon.Extensions
  summary: >-
    Shifts the given <xref href="System.DayOfWeek" data-throw-if-not-resolved="false"></xref> to another, regarding the

    new starting day of week.
  example: []
  syntax:
    content: public static DayOfWeek ShiftRegardingStartingWeekDay(this DayOfWeek value, DayOfWeek starting)
    parameters:
    - id: value
      type: System.DayOfWeek
      description: The <xref href="System.DayOfWeek" data-throw-if-not-resolved="false"></xref> to shift.
    - id: starting
      type: System.DayOfWeek
      description: The new starting <xref href="System.DayOfWeek" data-throw-if-not-resolved="false"></xref>.
    return:
      type: System.DayOfWeek
      description: >-
        The <xref href="System.DayOfWeek" data-throw-if-not-resolved="false"></xref> whose offset from

        <code class="paramref">starting</code> is the same offset from

        <xref href="System.DayOfWeek.Sunday" data-throw-if-not-resolved="false"></xref>.
    content.vb: Public Shared Function ShiftRegardingStartingWeekDay(value As DayOfWeek, starting As DayOfWeek) As DayOfWeek
