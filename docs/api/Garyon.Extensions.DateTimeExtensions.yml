      type: System.DateTime
      description: >-
        The <xref href="System.DateTime" data-throw-if-not-resolved="false"></xref> from which to create the copy with the

        adjusted time components.
    - id: time
      type: System.TimeSpan
      description: >-
        The time components of the resulting copied <xref href="System.DateTime" data-throw-if-not-resolved="false"></xref>,

        whose <xref href="System.TimeSpan.Days" data-throw-if-not-resolved="false"></xref> property should be 0.
    return:
      type: System.DateTime
      description: >-
        A copy of the original <xref href="System.DateTime" data-throw-if-not-resolved="false"></xref> with the time

        components set to the specified values.
    content.vb: Public Shared Function WithTime(dateTime As Date, time As TimeSpan) As Date
  overload: Garyon.Extensions.DateTimeExtensions.WithTime*
  exceptions:
  - type: System.ArgumentOutOfRangeException
    commentId: T:System.ArgumentOutOfRangeException
    description: >-
      The given value for <code class="paramref">time</code> represents an absolute time

      interval lasting at least an entire day.
  nameWithType.vb: DateTimeExtensions.WithTime(Date, TimeSpan)
  fullName.vb: Garyon.Extensions.DateTimeExtensions.WithTime(Date, System.TimeSpan)
  name.vb: WithTime(Date, TimeSpan)
