    components of the copied value are set to specified values.
  remarks: >-
    Consider normalizing the <xref href="System.TimeSpan" data-throw-if-not-resolved="false"></xref> using the

    <xref href="Garyon.Extensions.TimeSpanExtensions.WithinDay(System.TimeSpan)" data-throw-if-not-resolved="false"></xref> extension.

    <br />

    Since the <xref href="System.TimeSpan" data-throw-if-not-resolved="false"></xref> also retains ticks below the

    millisecond interval, its ticks will replace the existing

    <xref href="System.DateTime" data-throw-if-not-resolved="false"></xref> instance's.
  example: []
  syntax:
    content: public static DateTime WithTime(this DateTime dateTime, TimeSpan time)
    parameters:
