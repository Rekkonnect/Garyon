  summary: >-
    Yields a number of values into an existing instance of

    <xref href="System.Collections.Generic.SortedSet%601" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    This method first creates a new <xref href="System.Collections.Generic.List%601" data-throw-if-not-resolved="false"></xref> using

    <xref href="Garyon.Objects.Yielder%601.YieldList(System.Int32)" data-throw-if-not-resolved="false"></xref>, and then performs a union on

    <xref href="System.Collections.Generic.SortedSet%601" data-throw-if-not-resolved="false"></xref> with the created list. This approach is

    considered to be more optimal.
  example: []
  syntax:
