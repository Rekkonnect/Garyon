  assemblies:
  - Garyon
  namespace: Garyon.Extensions
  summary: Converts the given span into a span of bytes.
  remarks: >-
    The actual byte length of the span is preserved,

    the original span is unaffected and the result

    reinterprets the same content as a span of bytes.
  example: []
  syntax:
    content: 'public static ReadOnlySpan<byte> AsBytes<TSource>(this ReadOnlySpan<TSource> source) where TSource : struct'
    parameters:
    - id: source
      type: System.ReadOnlySpan{{TSource}}
    typeParameters:
    - id: TSource
    return:
      type: System.ReadOnlySpan{System.Byte}
    content.vb: Public Shared Function AsBytes(Of TSource As Structure)(source As ReadOnlySpan(Of TSource)) As ReadOnlySpan(Of Byte)
