  assemblies:
  - Garyon
  namespace: Garyon.Objects
  summary: Sets the struct reference to a reference of another struct instance.
  remarks: >-
    WARNING: The reference to the struct instance is not dynamically

    updated. If the GC moves the reference, a risk for memory corruption is

    induced.

    <br />

    One way to move the reference is if the unmanaged struct instance is a

    class instance field, which class instance is moved by the GC.
  example: []
  syntax:
    content: public void SetReference(ref T value)
    parameters:
    - id: value
      type: '{T}'
      description: The struct instance whose reference to store.
    content.vb: Public Sub SetReference(value As T)
  overload: Garyon.Objects.StructRef`1.SetReference*
  nameWithType.vb: StructRef(Of T).SetReference(T)
  fullName.vb: Garyon.Objects.StructRef(Of T).SetReference(T)
  name.vb: SetReference(T)
