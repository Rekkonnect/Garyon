  assemblies:
  - Garyon
  namespace: Garyon.Extensions
  summary: >-
    Determines whether all the elements of a collection are equal to all the

    respective elements of another collection in any order.
  example: []
  syntax:
    content: public static bool EqualsUnordered<T>(this IEnumerable<T> source, IEnumerable<T> other)
    parameters:
    - id: source
      type: System.Collections.Generic.IEnumerable{{T}}
      description: The first collection.
    - id: other
      type: System.Collections.Generic.IEnumerable{{T}}
      description: The second collection.
    typeParameters:
    - id: T
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if all the elements of any of the collections

        match exactly one unique element in the other collection, otherwise

        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>. This is determined by whether both collections

        are subsets of each other.
    content.vb: Public Shared Function EqualsUnordered(Of T)(source As IEnumerable(Of T), other As IEnumerable(Of T)) As Boolean
