  namespace: Garyon.Extensions
  summary: >-
    Flattens a collection of collections of collections into a single

    collection. The resulting elements are contained in the order they are

    enumerated depth-first.
  remarks: >-
    The function enumerates all the elements and caches them. This may

    induce a latency during enumeration of the collections. Prefer calling

    this function when enumeration of the same flattened collections is

    performed more than once.
