    <xref href="Garyon.Objects.Yielder%601.YieldList(System.Int32)" data-throw-if-not-resolved="false"></xref>, and then constructs the

    <xref href="System.Collections.Generic.SortedSet%601" data-throw-if-not-resolved="false"></xref> out of the created list. This approach is

    considered to be more optimal.
