  assemblies:
  - Garyon
  namespace: Garyon.Objects
  summary: Yields values out of the factory without storing them anywhere.
  remarks: >-
    As <xref href="Garyon.Objects.Yielder%601.Factory" data-throw-if-not-resolved="false"></xref> is mutable, the yielded results from the

    resulting <xref href="System.Collections.Generic.IEnumerable%601" data-throw-if-not-resolved="false"></xref> could use multiple factories,

    if adjusted from another external source.
  example: []
  syntax:
    content: public IEnumerable<T> Yield(int count)
    parameters:
    - id: count
      type: System.Int32
      description: The number of values to yield from the factory.
    return:
      type: System.Collections.Generic.IEnumerable{{T}}
      description: >-
        A <xref href="System.Collections.Generic.IEnumerable%601" data-throw-if-not-resolved="false"></xref> with the yielded values from the

        current <xref href="Garyon.Objects.Yielder%601.Factory" data-throw-if-not-resolved="false"></xref>.
    content.vb: Public Function Yield(count As Integer) As IEnumerable(Of T)
  overload: Garyon.Objects.Yielder`1.Yield*
  nameWithType.vb: Yielder(Of T).Yield(Integer)
  fullName.vb: Garyon.Objects.Yielder(Of T).Yield(Integer)
  name.vb: Yield(Integer)
