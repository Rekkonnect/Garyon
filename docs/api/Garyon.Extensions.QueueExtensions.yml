  namespace: Garyon.Extensions
  summary: Inserts an element in the queue at the specified index.
  remarks: >-
    This is an expensive operation, due to the lack of the necessary public

    APIs for speeding up the insertion.
  example: []
  syntax:
    content: public static void Insert<T>(this Queue<T> queue, T item, int index)
    parameters:
    - id: queue
      type: System.Collections.Generic.Queue{{T}}
      description: The queue.
    - id: item
      type: '{T}'
      description: The item to insert into the queue.
    - id: index
      type: System.Int32
      description: The index at which the item will be inserted.
    typeParameters:
    - id: T
      description: The type of the values stored in the queue.
