  summary: Adds the hash codes of a range of elements to the given <xref href="System.HashCode" data-throw-if-not-resolved="false"></xref> instance.
  example: []
  syntax:
    content: public static HashCode AddRange<T>(this HashCode hashCode, IEnumerable<T> elements)
    parameters:
    - id: hashCode
      type: System.HashCode
      description: The hash code instance that will also combine the hash codes of the given element collection.
    - id: elements
      type: System.Collections.Generic.IEnumerable{{T}}
      description: The elements whose hash codes to combine into the given hash code instance.
    typeParameters:
    - id: T
      description: The type of the elements in the collection.
    return:
      type: System.HashCode
      description: The resulting <xref href="System.HashCode" data-throw-if-not-resolved="false"></xref> that also contains the combined hash codes of the elements of the collection.
    content.vb: Public Shared Function AddRange(Of T)(hashCode As HashCode, elements As IEnumerable(Of T)) As HashCode
