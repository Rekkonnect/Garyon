    id: IsValidInstanceType
    path: ../Garyon/Reflection/DefaultInstanceContainer.cs
    startLine: 114
  assemblies:
  - Garyon
  namespace: Garyon.Reflection
  summary: >-
    Determines whether the given type can be considered a valid instance

    type.
  remarks: >-
    Defaults to always returning <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>. This can be a

    common implementation for unconstrained types whose default instances to

    initialize.
  example: []
  syntax:
    content: protected virtual bool IsValidInstanceType(Type type)
    parameters:
    - id: type
      type: System.Type
      description: >-
        The instance type to determine whether it is considered valid. The type

        will never be <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/abstract">abstract</a>, and will always be assignable

        to <code class="typeparamref">TBase</code> instances.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the type's default instance should be stored,

        otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Protected Overridable Function IsValidInstanceType(type As Type) As Boolean
  overload: Garyon.Reflection.DefaultInstanceContainer`1.IsValidInstanceType*
  nameWithType.vb: DefaultInstanceContainer(Of TBase).IsValidInstanceType(Type)
  fullName.vb: Garyon.Reflection.DefaultInstanceContainer(Of TBase).IsValidInstanceType(System.Type)
