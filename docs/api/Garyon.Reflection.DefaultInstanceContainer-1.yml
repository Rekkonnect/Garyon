  namespace: Garyon.Reflection
  summary: >-
    Initializes a new <xref href="Garyon.Reflection.DefaultInstanceContainer%601" data-throw-if-not-resolved="false"></xref>

    instance with all the types available from

    <xref href="Garyon.Reflection.AppDomainCache.Current" data-throw-if-not-resolved="false"></xref>, filtered through

    <xref href="Garyon.Reflection.DefaultInstanceContainer%601.IsValidInstanceType(System.Type)" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    All types that are considered valid must contain a constructor matching

    the argument types as returned from

    <xref href="Garyon.Reflection.DefaultInstanceContainer%601.GetDefaultInstanceArgumentTypes" data-throw-if-not-resolved="false"></xref>.
