  assemblies:
  - Garyon
  namespace: Garyon.Mechanisms
  summary: >-
    Initializes a new <xref href="Garyon.Mechanisms.LazyTimer" data-throw-if-not-resolved="false"></xref> such that it is initially

    marked as though the signal has been raised.
  remarks: >-
    The timer's next signal can be manually adjusted at any moment; this

    factory method does not prevent mutating the state of the timer.
  example: []
  syntax:
    content: public static LazyTimer InitializeRaised()
    return:
      type: Garyon.Mechanisms.LazyTimer
      description: >-
        A new <xref href="Garyon.Mechanisms.LazyTimer" data-throw-if-not-resolved="false"></xref> instance with the

        <xref href="Garyon.Mechanisms.LazyTimer.NextSignal" data-throw-if-not-resolved="false"></xref> initialized to the current time

        representing a timer whose signal has been raised.
    content.vb: Public Shared Function InitializeRaised() As LazyTimer
  overload: Garyon.Mechanisms.LazyTimer.InitializeRaised*
