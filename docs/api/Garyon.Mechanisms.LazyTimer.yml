    id: ResetIfRaisedSignal
    path: ../Garyon/Mechanisms/LazyTimer.cs
    startLine: 56
  assemblies:
  - Garyon
  namespace: Garyon.Mechanisms
  summary: >-
    Resets the timer only if the signal has been raised, and adjusts the

    next signal timestamp based on the current time and the timespan

    offsetting the current time.
  example: []
  syntax:
    content: public bool ResetIfRaisedSignal(TimeSpan nextSignalSpan)
    parameters:
    - id: nextSignalSpan
      type: System.TimeSpan
      description: >-
        The <xref href="System.TimeSpan" data-throw-if-not-resolved="false"></xref> offsetting the current time that will be

        set as the timestamp for the next signal if the timer is reset.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the signal had been raised and its next signal

        timestamp was adjusted, otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Public Function ResetIfRaisedSignal(nextSignalSpan As TimeSpan) As Boolean
  overload: Garyon.Mechanisms.LazyTimer.ResetIfRaisedSignal*
