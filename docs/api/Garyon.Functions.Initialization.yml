    id: TryInitializeUpcast
    path: ../Garyon/Functions/Initialization.cs
    startLine: 32
  assemblies:
  - Garyon
  namespace: Garyon.Functions
  summary: >-
    Attempts to initialize a field of type <code class="typeparamref">TDerived</code>,

    with a suitable <code class="typeparamref">TDerived</code> value stored in a

    variable of <code class="typeparamref">TBase</code>.
  example: []
  syntax:
    content: 'public static bool TryInitializeUpcast<TDerived, TBase>(ref TDerived? field, TBase value) where TDerived : class, TBase where TBase : class'
    parameters:
    - id: field
      type: '{TDerived}'
      description: >-
        The field that will be initialized, if not already initialized. This

        means, if the field is not <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>, it will not be set.
    - id: value
      type: '{TBase}'
      description: >-
        The value to attempt to set the field to, if its runtime type is at

        least <code class="typeparamref">TDerived</code>.
    typeParameters:
    - id: TDerived
      description: The type of the values stored in the field.
    - id: TBase
      description: The base type, from which <code class="typeparamref">TDerived</code> derives.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if <code class="paramref">field</code> was

        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> at the time of calling this method, and the

        runtime type of <code class="paramref">value</code> allows its value to be stored

        in <code class="paramref">field</code>, otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Public Shared Function TryInitializeUpcast(Of TDerived As {Class, TBase}, TBase As Class)(field As TDerived, value As TBase) As Boolean
  overload: Garyon.Functions.Initialization.TryInitializeUpcast*
  nameWithType.vb: Initialization.TryInitializeUpcast(Of TDerived, TBase)(TDerived, TBase)
  fullName.vb: Garyon.Functions.Initialization.TryInitializeUpcast(Of TDerived, TBase)(TDerived, TBase)
  name.vb: TryInitializeUpcast(Of TDerived, TBase)(TDerived, TBase)
