    - id: field
      type: '{TDerived}'
      description: The field that may be set to the given value.
    - id: value
      type: '{TBase}'
      description: >-
        The value to attempt to set the field to, if its runtime type is at

        least <code class="typeparamref">TDerived</code>.
    typeParameters:
