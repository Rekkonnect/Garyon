  summary: >-
    Provides version information about the application, usually parsed from

    <xref href="System.Reflection.AssemblyInformationalVersionAttribute" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: public AppVersionInfo(string Version, string? PreviewIndicator, string? CommitSha)
    parameters:
    - id: Version
      type: System.String
      description: >-
        The main part of the informational version. Assuming a version like

        '1.2.3-preview', the main version is the '1.2.3' part.
    - id: PreviewIndicator
      type: System.String
      description: >-
        The optional preview indicator that follows the version string. Assuming a

        version like '1.2.3-preview', the preview indicator is the 'preview' part.
    - id: CommitSha
      type: System.String
      description: The SHA of the commit that built the application, if available.
