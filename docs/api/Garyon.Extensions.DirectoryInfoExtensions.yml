  summary: >-
    Attempts to delete the given directory, catching any thrown exception

    from the operation and returning whether the operation succeeded.
  example: []
  syntax:
    content: public static bool TryDelete(this DirectoryInfo directory, bool recursive)
    parameters:
    - id: directory
      type: System.IO.DirectoryInfo
      description: The directory to delete.
    - id: recursive
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> to delete all the contents of the directory and

        subdirectories; <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> to delete only the directory

