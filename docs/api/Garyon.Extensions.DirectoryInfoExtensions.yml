  assemblies:
  - Garyon
  namespace: Garyon.Extensions
  summary: >-
    Gets the ancestor directory of this directory, at a specified number of

    levels up in the directory tree. If the current directory's depth is

    less than the provided number of levels to walk up,

    <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> is returned.
  example: []
  syntax:
    content: public static DirectoryInfo? RecursiveParent(this DirectoryInfo directory, int levels = 1)
    parameters:
    - id: directory
      type: System.IO.DirectoryInfo
      description: The directory to walk up from.
    - id: levels
      type: System.Int32
      description: >-
        The number of levels to walk up the directory tree. 0 returns the

        current directory.
    return:
      type: System.IO.DirectoryInfo
      description: >-
        The ancestor directory at the given level, or <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> if

        the given directory's depth was less than the given number of levels to

        walk up.
    content.vb: Public Shared Function RecursiveParent(directory As DirectoryInfo, levels As Integer = 1) As DirectoryInfo
