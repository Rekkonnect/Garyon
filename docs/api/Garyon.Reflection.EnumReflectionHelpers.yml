  summary: >-
    Constructs a <xref href="System.Collections.Generic.Dictionary%602" data-throw-if-not-resolved="false"></xref> mapping the

    provided enum's fields to a sought attribute.
  example: []
  syntax:
    content: 'public static Dictionary<TEnum, TAttribute> GetEnumFieldDictionary<TEnum, TAttribute>() where TEnum : struct, Enum where TAttribute : Attribute'
    typeParameters:
    - id: TEnum
      description: The type of the enum whose fields to construct the dictionary of.
    - id: TAttribute
      description: The type of the attribute to seek for in each field.
    return:
      type: System.Collections.Generic.Dictionary{{TEnum},{TAttribute}}
      description: >-
        The resulting constructed <xref href="System.Collections.Generic.Dictionary%602" data-throw-if-not-resolved="false"></xref>

        containing the enum fields mapped to their chosen sought attributes.
