  summary: >-
    Constructs a <xref href="System.Collections.Generic.Dictionary%602" data-throw-if-not-resolved="false"></xref> mapping the

    provided enum's fields to a value provided from a sought attribute.
  example: []
  syntax:
    content: 'public static Dictionary<TEnum, TMappedValue> GetEnumFieldDictionary<TEnum, TAttribute, TMappedValue>(Func<TAttribute?, TMappedValue?> selector) where TEnum : struct, Enum where TAttribute : Attribute'
    parameters:
    - id: selector
      type: System.Func{{TAttribute},{TMappedValue}}
      description: >-
        The function that selects the value to map the respective field to,

        given its attribute instance, if found. It should expect nulls.
    typeParameters:
    - id: TEnum
      description: The type of the enum whose fields to construct the dictionary of.
    - id: TAttribute
      description: The type of the attribute to seek for in each field.
    - id: TMappedValue
      description: The type of the value to map the fields to.
    return:
      type: System.Collections.Generic.Dictionary{{TEnum},{TMappedValue}}
      description: >-
        The resulting constructed <xref href="System.Collections.Generic.Dictionary%602" data-throw-if-not-resolved="false"></xref>

        containing the enum fields mapped to their chosen values.
    content.vb: Public Shared Function GetEnumFieldDictionary(Of TEnum As {Structure, [Enum]}, TAttribute As Attribute, TMappedValue)(selector As Func(Of TAttribute, TMappedValue)) As Dictionary(Of TEnum, TMappedValue)
