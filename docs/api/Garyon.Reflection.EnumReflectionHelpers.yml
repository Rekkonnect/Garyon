  summary: >-
    Constructs a <xref href="System.Collections.Generic.Dictionary%602" data-throw-if-not-resolved="false"></xref> mapping the

    provided enum's fields to their descriptions, as provided through their

    <xref href="System.ComponentModel.DescriptionAttribute" data-throw-if-not-resolved="false"></xref>s.
  example: []
  syntax:
    content: 'public static Dictionary<T, string> GetEnumFieldDescriptionDictionary<T>() where T : struct, Enum'
    typeParameters:
    - id: T
      description: The type of the enum whose fields to construct the dictionary of.
    return:
      type: System.Collections.Generic.Dictionary{{T},System.String}
      description: >-
        The resulting constructed <xref href="System.Collections.Generic.Dictionary%602" data-throw-if-not-resolved="false"></xref>

        containing the enum fields mapped to their descriptions.
    content.vb: Public Shared Function GetEnumFieldDescriptionDictionary(Of T As {Structure, [Enum]})() As Dictionary(Of T, String)
